name: Release Docker
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      dry_run:
        required: true
        type: boolean
        default: true
        description: 'DryRun?'

env:
  COMMIT_SHA: ${{ github.sha }}

permissions:
  contents: read

concurrency:
  group: release-docker-${{ github.event.release.tag_name || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build-docker:
    runs-on: ubuntu-latest
    name: Build Dockers
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setting env var
        id: env_var
        shell: bash
        run: |
          echo "RENDERSCRIPT_VERSION=$(node -e 'console.log(require("./package.json").version)')" >> $GITHUB_OUTPUT
          {
            echo '## Docker release diagnostics'
            echo "- event: ${GITHUB_EVENT_NAME}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- version: $(node -e 'console.log(require(\"./package.json\").version)')"
            echo "- dry_run: ${{ github.event.inputs.dry_run || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker QEMU for arm64 docker builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64 # buildx does not support multi-arch load
          push: false
          load: true
          tags: |
            algolia/renderscript:latest
            algolia/renderscript:${{ steps.env_var.outputs.RENDERSCRIPT_VERSION }}
            algolia/renderscript:${{ env.COMMIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.env_var.outputs.RENDERSCRIPT_VERSION }}

      - name: Test Image
        run: ./scripts/test_image.sh ${{ env.COMMIT_SHA }}

      # Cache should be reused from prev execution
      - name: Push
        if: (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            algolia/renderscript:latest
            algolia/renderscript:${{ steps.env_var.outputs.RENDERSCRIPT_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.env_var.outputs.RENDERSCRIPT_VERSION }}

      - name: Upload docker test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-logs-${{ github.run_id }}
          path: renderscript_test.log
          if-no-files-found: ignore
